<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxograma — GoodWe EV Chatbot</title>
<style>
  body { font-family: sans-serif; background: #f5f5f2; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 18px; font-weight: 600; color: #2c2c2a; margin-bottom: 4px; }
  p  { font-size: 13px; color: #666; margin-bottom: 24px; }
  svg { max-width: 680px; width: 100%; }
  .box   { fill: #fff; stroke: #ccc; stroke-width: 0.5; }
  .teal  { fill: #E1F5EE; stroke: #0F6E56; }
  .purple{ fill: #EEEDFE; stroke: #534AB7; }
  .amber { fill: #FAEEDA; stroke: #854F0B; }
  .blue  { fill: #E6F1FB; stroke: #185FA5; }
  .coral { fill: #FAECE7; stroke: #993C1D; }
  .th    { font-size: 14px; font-weight: 600; fill: #2c2c2a; }
  .ts    { font-size: 12px; fill: #666; }
  .arr   { stroke: #888; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  .leader{ stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
</style>
</head>
<body>
<h1>GoodWe EV Chatbot — Fluxograma de Funcionamento</h1>
<p>EV Challenge 2026 · RAG com LLaMA 3.2-1B-Instruct + LangChain + LangGraph</p>
<svg viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- PERSONA -->
<rect class="teal" x="220" y="30" width="240" height="56" rx="8"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Operador comercial</text>
<text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">Digita a pergunta no chatbot</text>

<line class="arr" x1="340" y1="86" x2="340" y2="126"/>

<!-- RETRIEVE -->
<rect class="purple" x="180" y="126" width="320" height="56" rx="8"/>
<text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">Nó RETRIEVE</text>
<text class="ts" x="340" y="166" text-anchor="middle" dominant-baseline="central">Busca semântica no InMemoryVectorStore</text>

<line class="arr" x1="340" y1="182" x2="340" y2="222"/>

<!-- PDFs -->
<rect class="amber" x="100" y="222" width="160" height="56" rx="8"/>
<text class="th" x="180" y="244" text-anchor="middle" dominant-baseline="central">PDF 1</text>
<text class="ts" x="180" y="262" text-anchor="middle" dominant-baseline="central">Manual GoodWe</text>

<rect class="amber" x="420" y="222" width="160" height="56" rx="8"/>
<text class="th" x="500" y="244" text-anchor="middle" dominant-baseline="central">PDF 2</text>
<text class="ts" x="500" y="262" text-anchor="middle" dominant-baseline="central">Documentação EV</text>

<line class="arr" x1="260" y1="250" x2="310" y2="310"/>
<line class="arr" x1="420" y1="250" x2="370" y2="310"/>

<!-- TOP-K -->
<rect class="blue" x="210" y="310" width="260" height="56" rx="8"/>
<text class="th" x="340" y="332" text-anchor="middle" dominant-baseline="central">Top-4 trechos relevantes</text>
<text class="ts" x="340" y="350" text-anchor="middle" dominant-baseline="central">RecursiveCharacterTextSplitter</text>

<line class="arr" x1="340" y1="366" x2="340" y2="406"/>

<!-- GENERATE -->
<rect class="purple" x="180" y="406" width="320" height="56" rx="8"/>
<text class="th" x="340" y="428" text-anchor="middle" dominant-baseline="central">Nó GENERATE</text>
<text class="ts" x="340" y="446" text-anchor="middle" dominant-baseline="central">Monta prompt: system prompt + contexto + pergunta</text>

<line class="arr" x1="340" y1="462" x2="340" y2="502"/>

<!-- LLAMA -->
<rect class="coral" x="190" y="502" width="300" height="56" rx="8"/>
<text class="th" x="340" y="524" text-anchor="middle" dominant-baseline="central">LLaMA 3.2-1B-Instruct</text>
<text class="ts" x="340" y="542" text-anchor="middle" dominant-baseline="central">HuggingFace — geração da resposta</text>

<line class="arr" x1="340" y1="558" x2="340" y2="598"/>

<!-- SAÍDA -->
<rect class="teal" x="220" y="598" width="240" height="56" rx="8"/>
<text class="th" x="340" y="620" text-anchor="middle" dominant-baseline="central">Resposta ao operador</text>
<text class="ts" x="340" y="638" text-anchor="middle" dominant-baseline="central">Texto + documentos-fonte citados</text>

<!-- labels laterais -->
<text class="ts" x="48" y="58" text-anchor="middle">Entrada</text>
<line class="leader" x1="48" y1="66" x2="48" y2="174"/>
<text class="ts" x="48" y="186" text-anchor="middle">RAG</text>
<line class="leader" x1="48" y1="194" x2="48" y2="554"/>
<text class="ts" x="48" y="566" text-anchor="middle">Saída</text>

</svg>
</body>
</html>
